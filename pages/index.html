<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TripleThreat AI Picks — Histórico</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --orange: #FF8C00;
      --blue: #1E90FF;
      --white: #FFFFFF;
      --black: #0F0F0F;
      --dark-gray: #1a1a1a;
      --card-bg: #161a22;
      --border: #242a36;
      --win: #10b981;
      --loss: #ef4444;
      --push: #f59e0b;
      --pending: #6b7280;
      --text: #e5e7eb;
      --muted: #9ca3af;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: linear-gradient(135deg, var(--black) 0%, #1a1a2e 100%);
      color: var(--text);
      min-height: 100vh;
    }

    /* HEADER */
    header {
      padding: 20px 16px;
      border-bottom: 2px solid;
      border-image: linear-gradient(90deg, var(--orange), var(--blue)) 1;
      background: rgba(15, 15, 15, 0.8);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      margin: 0 0 4px;
      font-size: 24px;
      background: linear-gradient(90deg, var(--orange), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 900;
      letter-spacing: -1px;
    }

    .sub {
      color: var(--muted);
      font-size: 12px;
      margin: 0;
    }

    /* MAIN CONTENT */
    main {
      padding: 16px;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* HERO STATS */
    .hero-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: rgba(255, 140, 0, 0.08);
      border: 1px solid var(--orange);
      padding: 16px;
      border-radius: 12px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, var(--orange) 0%, var(--blue) 100%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .stat-card:hover::before {
      opacity: 0.1;
    }

    .stat-card-inner {
      position: relative;
      z-index: 1;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 900;
      margin-bottom: 4px;
      background: linear-gradient(90deg, var(--orange), var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 600;
    }

    .stat-card.negative .stat-value {
      color: var(--loss);
    }

    /* TABS */
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      padding: 0 0 8px 0;
    }

    .tab-btn {
      padding: 10px 16px;
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      border-bottom: 2px solid transparent;
      transition: all 0.3s;
      white-space: nowrap;
    }

    .tab-btn.active {
      color: var(--orange);
      border-bottom-color: var(--orange);
    }

    .tab-btn:hover {
      color: var(--blue);
    }

    /* PANELS */
    .panel {
      display: none;
    }

    .panel.active {
      display: block;
    }

    /* CHARTS */
    .chart-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      position: relative;
    }

    .chart-container h3 {
      margin: 0 0 16px;
      font-size: 16px;
      color: var(--white);
    }

    .chart-wrapper {
      position: relative;
      height: 300px;
    }

    /* MARKET GRID */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .market-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      position: relative;
      overflow: hidden;
    }

    .market-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 4px;
      background: linear-gradient(180deg, var(--orange), var(--blue));
    }

    .market-name {
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--white);
    }

    .market-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 13px;
    }

    .market-stat {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255, 140, 0, 0.1);
    }

    .market-stat-label {
      color: var(--muted);
    }

    .market-stat-value {
      color: var(--orange);
      font-weight: 600;
    }

    /* FILTERS */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .filters input,
    .filters select {
      background: var(--card-bg);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 13px;
      transition: all 0.3s;
    }

    .filters input:focus,
    .filters select:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.1);
    }

    /* TABLE */
    .table-container {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      background: rgba(255, 140, 0, 0.05);
      border-bottom: 2px solid var(--orange);
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: var(--orange);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      cursor: pointer;
      user-select: none;
    }

    th:hover {
      background: rgba(255, 140, 0, 0.1);
    }

    td {
      padding: 12px;
      border-bottom: 1px solid var(--border);
    }

    tr:hover {
      background: rgba(255, 140, 0, 0.04);
    }

    .r-WIN {
      color: var(--win);
      font-weight: 600;
    }

    .r-LOSS {
      color: var(--loss);
      font-weight: 600;
    }

    .r-PUSH {
      color: var(--push);
      font-weight: 600;
    }

    .r-pending {
      color: var(--pending);
      font-style: italic;
    }

    .side {
      font-weight: 600;
      color: var(--orange);
    }

    .muted {
      color: var(--muted);
    }

    .no-data {
      text-align: center;
      padding: 48px 24px;
      color: var(--muted);
    }

    /* LOADING */
    .loading {
      text-align: center;
      padding: 24px;
      color: var(--muted);
    }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      header h1 {
        font-size: 20px;
      }

      .hero-stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .stat-value {
        font-size: 22px;
      }

      .chart-wrapper {
        height: 250px;
      }

      .market-grid {
        grid-template-columns: 1fr;
      }

      .hide-mobile {
        display: none;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 8px;
      }

      .tabs {
        scroll-behavior: smooth;
      }

      main {
        padding: 12px;
      }
    }

    /* ANIMATIONS */
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 5px rgba(255, 140, 0, 0.3); }
      50% { box-shadow: 0 0 20px rgba(255, 140, 0, 0.6); }
    }

    .stat-card:hover {
      animation: glow 2s ease-in-out;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏀 TripleThreat AI Picks</h1>
    <p class="sub">Última atualização: <span id="updated">—</span></p>
  </header>

  <main>
    <!-- HERO STATS -->
    <div class="hero-stats" id="hero-stats"></div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" data-tab="overview">📊 Visão Geral</button>
      <button class="tab-btn" data-tab="markets">🎯 Por Mercado</button>
      <button class="tab-btn" data-tab="table">📋 Histórico</button>
    </div>

    <!-- OVERVIEW TAB -->
    <div class="panel active" id="tab-overview">
      <div class="chart-container">
        <h3>Ganho/Perda Cumulativo</h3>
        <div class="chart-wrapper">
          <canvas id="cumulative-chart"></canvas>
        </div>
      </div>

      <div class="chart-container">
        <h3>Win Rate por Dia</h3>
        <div class="chart-wrapper">
          <canvas id="daily-wr-chart"></canvas>
        </div>
      </div>

      <div class="chart-container">
        <h3>Distribuição de Resultados</h3>
        <div class="chart-wrapper">
          <canvas id="results-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- MARKETS TAB -->
    <div class="panel" id="tab-markets">
      <div class="market-grid" id="market-grid"></div>

      <div class="chart-container">
        <h3>Comparação de Mercados (Win Rate)</h3>
        <div class="chart-wrapper">
          <canvas id="markets-chart"></canvas>
        </div>
      </div>
    </div>

    <!-- TABLE TAB -->
    <div class="panel" id="tab-table">
      <div class="filters">
        <input id="f-player" placeholder="🔍 Pesquisar jogador..." />
        <select id="f-market">
          <option value="">Todos mercados</option>
        </select>
        <select id="f-result">
          <option value="">Todos resultados</option>
          <option value="WIN">✅ Win</option>
          <option value="LOSS">❌ Loss</option>
          <option value="PUSH">➖ Push</option>
          <option value="pending">⏳ Pendente</option>
        </select>
      </div>

      <div class="table-container">
        <table id="tbl">
          <thead>
            <tr>
              <th data-k="game_date">Data</th>
              <th>Jogo</th>
              <th data-k="player_name">Jogador</th>
              <th>Mercado</th>
              <th data-k="line">Linha</th>
              <th data-k="decimal_odds">Odds</th>
              <th data-k="ev">EV</th>
              <th class="hide-mobile">Modelo</th>
              <th>Resultado</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="no-data" style="display:none;">📭 Sem dados ainda. A aguardar primeira execução.</div>
      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
