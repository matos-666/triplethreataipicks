<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NBA Props — Histórico</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #161a22;
    --fg: #e5e7eb;
    --muted: #9ca3af;
    --win: #10b981;
    --loss: #ef4444;
    --push: #f59e0b;
    --pending: #6b7280;
    --accent: #60a5fa;
    --border: #242a36;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    background: var(--bg); color: var(--fg);
  }
  header { padding: 24px; border-bottom: 1px solid var(--border); }
  h1 { margin: 0 0 4px; font-size: 22px; }
  .sub { color: var(--muted); font-size: 13px; }
  main { padding: 24px; max-width: 1400px; margin: 0 auto; }
  .summary {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .stat { background: var(--card); padding: 16px; border-radius: 8px; border: 1px solid var(--border); }
  .stat .n { font-size: 24px; font-weight: 600; }
  .stat .l { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
  .filters { margin-bottom: 16px; display: flex; gap: 8px; flex-wrap: wrap; }
  .filters input, .filters select {
    background: var(--card); color: var(--fg); border: 1px solid var(--border);
    padding: 8px 12px; border-radius: 6px; font-size: 14px;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: var(--card); font-weight: 500; color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }
  tr:hover { background: rgba(255,255,255,0.02); }
  .r-WIN { color: var(--win); font-weight: 600; }
  .r-LOSS { color: var(--loss); font-weight: 600; }
  .r-PUSH { color: var(--push); font-weight: 600; }
  .r-pending { color: var(--pending); font-style: italic; }
  .ev-pos { color: var(--win); }
  .ev-neg { color: var(--loss); }
  .side { font-weight: 600; }
  .muted { color: var(--muted); font-size: 12px; }
  .no-data { text-align: center; padding: 48px; color: var(--muted); }
  @media (max-width: 600px) {
    .hide-mobile { display: none; }
  }
</style>
</head>
<body>
<header>
  <h1>🏀 NBA Props — Histórico</h1>
  <div class="sub">Última actualização: <span id="updated">—</span></div>
</header>
<main>
  <div class="summary" id="summary"></div>
  <div class="filters">
    <input id="f-player" placeholder="Pesquisar jogador..." />
    <select id="f-market">
      <option value="">Todos mercados</option>
    </select>
    <select id="f-result">
      <option value="">Todos resultados</option>
      <option value="WIN">Win</option>
      <option value="LOSS">Loss</option>
      <option value="PUSH">Push</option>
      <option value="pending">Pendente</option>
    </select>
  </div>
  <div id="tbl-wrap">
    <table id="tbl">
      <thead>
        <tr>
          <th data-k="game_date">Data</th>
          <th>Jogo</th>
          <th data-k="player_name">Jogador</th>
          <th>Mercado</th>
          <th data-k="line">Linha</th>
          <th data-k="decimal_odds">Odds</th>
          <th data-k="ev">EV</th>
          <th class="hide-mobile">Modelo</th>
          <th class="hide-mobile">Book</th>
          <th>Resultado</th>
        </tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <div id="empty" class="no-data" style="display:none">Sem dados ainda. A aguardar primeira execução.</div>
  </div>
</main>
<script src="app.js"></script>
</body>
</html>
