name: Poll Telegram Commands

on:
  schedule:
    # Every 5 minutes. GitHub enforces a 5-min minimum.
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nba-telegram-poll
  cancel-in-progress: true

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps (minimal)
        run: pip install requests

      - name: Poll Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python -m src.telegram_bot poll

      - name: Commit settings if changed
        run: |
          git config user.name "nba-bot"
          git config user.email "nba-bot@users.noreply.github.com"
          git add settings.json || true
          git diff --cached --quiet || git commit -m "telegram: settings update"
          git push || true
